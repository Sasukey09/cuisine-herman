name: CI

# Gate every change to main. Nothing here talks to production.
# Runs on every branch too, so a change can be proven green *before* it reaches
# main — which is what actually deploys (Render/Vercel auto-deploy from main).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- backend --
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    services:
      postgres:
        # The initial migration runs sql/schema.sql, which needs the `vector`
        # extension — a bare postgres image cannot create it.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cuisine_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # A real (throwaway) key: app.core.security now refuses placeholders.
      SECRET_KEY: ci-only-secret-2f8b9c1d4e6a7b3c5d9e0f1a2b3c4d5e6f7a8b9c
      DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/cuisine_test
      # No OCR keys in CI, and the stub must NOT rescue us silently.
      OCR_ALLOW_STUB_FALLBACK: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # same as the Dockerfile
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pytest.ini forces --cov, so pytest-cov must be present.
          pip install ruff pytest pytest-cov

      - name: Lint (errors only — style is not a gate yet)
        working-directory: backend
        run: ruff check app tests --select E9,F63,F7,F82

      # Before the tests, not after: otherwise the Postgres service sits there
      # empty and no test can touch a real database. That gap is how an endpoint
      # shipped a 500 in production while the suite was green — every test mocked
      # the session, so no real Decimal or datetime ever went through it.
      - name: Migrations apply from scratch
        working-directory: backend
        run: alembic upgrade head

      - name: Tests
        working-directory: backend
        run: pytest -q

      # The tests import the app directly, so they never exercise the command
      # that actually runs in production. That blind spot shipped a broken
      # deploy: bumping uvicorn removed `uvicorn.workers.UvicornWorker`, the
      # worker class gunicorn loads — the container died on boot and CI was
      # green. Boot the real thing and talk to it.
      - name: Boot with the production command (gunicorn + uvicorn worker)
        working-directory: backend
        env:
          PORT: "8123"
          WEB_CONCURRENCY: "1"
        run: |
          gunicorn app.main:app -k uvicorn_worker.UvicornWorker \
            -b 0.0.0.0:8123 -w 1 --timeout 30 --access-logfile - &
          GUNICORN_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8123/health > /dev/null; then
              echo "OK: the production command boots and serves /health."
              kill $GUNICORN_PID
              exit 0
            fi
            if ! kill -0 $GUNICORN_PID 2>/dev/null; then
              echo "::error::the production command died on boot"
              exit 1
            fi
            sleep 2
          done
          echo "::error::/health never answered — the app did not come up"
          kill $GUNICORN_PID 2>/dev/null || true
          exit 1

  # ------------------------------------------------------ dependency audit --
  audit:
    name: Backend — dependency audit
    runs-on: ubuntu-latest
    # A hard gate now. It was only advisory while the stack carried 31 known
    # vulnerabilities (a permanently red pipeline is one the team learns to
    # ignore). The stack is clean, so any NEW advisory must block the merge.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pip-audit
      - name: pip-audit
        working-directory: backend
        run: pip-audit -r requirements.txt --desc

  # --------------------------------------------------------------- frontend --
  frontend:
    name: Web — lint, types, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://ci.invalid/api/v1
        run: npm run build

  # ----------------------------------------------------------------- mobile --
  mobile:
    name: Mobile — analyze + release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pinned to the dev machine's version. The action's rolling "stable"
          # resolved an older Flutter (compileSdk 34, no built-in Kotlin), which
          # does not reproduce what we actually build against.
          flutter-version: 3.44.1
          cache: true

      # The native folders are gitignored and regenerated here. `flutter create`
      # never overwrites an existing file, so our tracked AndroidManifest.xml
      # (the one carrying INTERNET) survives.
      - name: Generate native scaffolding
        working-directory: mobile
        run: |
          flutter create --platforms=android \
            --org com.foodgad --project-name foodgad_mobile .
          flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # The offline queue decides what gets retried and what gets dropped — i.e.
      # whether the user's work survives. That belongs under test.
      - name: Tests
        working-directory: mobile
        run: flutter test

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      # Regression test for the bug that made every release build offline.
      # Scoped to build/app: the root Gradle script redirects each plugin's build
      # dir under build/<plugin>/, and those carry their own merged manifests.
      - name: The release manifest must grant INTERNET
        working-directory: mobile
        run: |
          MERGED=$(find build/app -path '*merged_manifest*release*' \
                   -name AndroidManifest.xml | head -1)
          if [ -z "$MERGED" ]; then
            echo "::error::merged release manifest of the app module not found"; exit 1
          fi
          echo "Checking $MERGED"
          if ! grep -q 'android.permission.INTERNET' "$MERGED"; then
            echo "::error::INTERNET permission missing — every API call would fail in release"
            exit 1
          fi
          echo "OK: INTERNET granted in the app's release manifest."
