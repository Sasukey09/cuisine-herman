route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical
      repeat_interval: 1h

receivers:
  # Default receiver: no notifier configured (alerts visible in the UI only).
  - name: default

  # Critical receiver — wire up Slack / email / PagerDuty here.
  - name: critical
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/XXXXX"
    #     channel: "#alerts"
    #     send_resolved: true
    # email_configs:
    #   - to: "ops@cuisine-herman.fr"
    #     from: "alertmanager@cuisine-herman.fr"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "alertmanager@cuisine-herman.fr"
    #     auth_password: "CHANGE_ME"

inhibit_rules:
  # A critical alert silences a warning with the same alertname.
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["alertname"]
