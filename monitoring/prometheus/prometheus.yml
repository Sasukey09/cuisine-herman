global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: cuisine-herman-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
