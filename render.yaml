# ---------------------------------------------------------------------------
# RÉGION — action à fort impact, gratuite.
#
# Les services actuels tournent en Oregon (gcp-us-west1) : vérifié, l'origine
# résout en gcp-us-west1-1.origin.onrender.com. Tous les utilisateurs sont en
# France -> ~150-200 ms ajoutées à CHAQUE requête (les endpoints les plus
# triviaux mesurent 250-400 ms depuis Paris).
#
# `region: frankfurt` ci-dessous s'applique aux services CRÉÉS à partir de ce
# blueprint. Render ne peut PAS déplacer un service existant : il faut le
# recréer (web + base + redis) dans la nouvelle région. À faire au moment du
# passage en plan payant — qui est de toute façon nécessaire (voir plus bas).
# ---------------------------------------------------------------------------
# Render.com Blueprint — provisions the whole backend stack.
# Deploy: push to GitHub, then Render Dashboard -> New -> Blueprint -> pick this repo.
# Set CORS_ORIGINS (your frontend URL) and, for real OCR, MISTRAL_API_KEY.

databases:
  - name: cuisine-db
    databaseName: cuisine
    user: cuisine
    # SAUVEGARDES (B3): le plan `free` n'a AUCUNE sauvegarde. Un plan payant active
    # les backups quotidiens geres par Render + la restauration point-in-time (PITR).
    # C'est la strategie de sauvegarde primaire. Voir docs/BACKUP-RESTORE.md pour la
    # retention, la procedure de restauration et le drill de verification.
    plan: basic-1gb
    region: frankfurt      # cf. l'entete : les services actuels sont en Oregon

services:
  # --- Redis (Celery broker / cache) ---
  - type: keyvalue
    name: cuisine-redis
    plan: free
    region: frankfurt      # cf. l'entete : les services actuels sont en Oregon
    ipAllowList: []

  # --- FastAPI backend ---
  - type: web
    name: cuisine-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt      # cf. l'entete : les services actuels sont en Oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuisine-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret
      # I1 — observabilite:
      - key: METRICS_TOKEN
        generateValue: true          # /metrics exige "Authorization: Bearer <ce token>"
      - key: SENTRY_DSN
        sync: false                  # <-- coller le DSN Sentry pour activer le reporting
      - key: APP_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: OCR_PROVIDER_CHAIN
        value: mistral,google
      - key: OCR_ALLOW_STUB_FALLBACK
        # MUST stay false. When true and the OCR provider fails, the pipeline
        # silently returns a canned demo invoice ("Fournisseur: March, Tomates
        # 10 kg…") which is then priced, written to the purchase ledger and
        # propagated into every recipe cost derived from it. A provider outage
        # must surface as an error, never as fabricated accounting data.
        value: "false"
      - key: CORS_ORIGINS
        sync: false                  # <-- set to your frontend URL, e.g. https://app.vercel.app
      # Object storage (use a managed S3-compatible service, e.g. Cloudflare R2):
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      # Real OCR (optional):
      - key: MISTRAL_API_KEY
        sync: false
      # --- AI assistant + video recipe extraction (Claude) ---
      - key: ANTHROPIC_API_KEY
        sync: false                  # required for /ai/chat and video extraction
      - key: AI_MODEL
        value: claude-opus-4-8
      - key: AI_EFFORT
        value: medium
      # --- Video import: Whisper STT for non-YouTube (TikTok/Insta/FB) ---
      - key: OPENAI_API_KEY
        sync: false                  # required only for audio transcription (non-YouTube)
      - key: VIDEO_STT_MODEL
        value: whisper-1
      - key: VIDEO_MAX_DURATION_SECONDS
        value: "1800"

  # --- Celery worker (shares the backend image) ---
  - type: worker
    name: cuisine-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.celery_app.celery_app worker --loglevel=info
    plan: free
    region: frankfurt      # cf. l'entete : les services actuels sont en Oregon
    envVars:
      - key: SENTRY_DSN
        sync: false                  # meme DSN que le web: remonter les crashs worker
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cuisine-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
