# Render.com Blueprint — provisions the whole backend stack.
# Deploy: push to GitHub, then Render Dashboard -> New -> Blueprint -> pick this repo.
# Set CORS_ORIGINS (your frontend URL) and, for real OCR, MISTRAL_API_KEY.

databases:
  - name: cuisine-db
    databaseName: cuisine
    user: cuisine
    plan: free

services:
  # --- Redis (Celery broker / cache) ---
  - type: keyvalue
    name: cuisine-redis
    plan: free
    ipAllowList: []

  # --- FastAPI backend ---
  - type: web
    name: cuisine-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuisine-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: WEB_CONCURRENCY
        value: "2"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: OCR_PROVIDER_CHAIN
        value: mistral,google
      - key: OCR_ALLOW_STUB_FALLBACK
        value: "true"                # set false once a real OCR provider is configured
      - key: CORS_ORIGINS
        sync: false                  # <-- set to your frontend URL, e.g. https://app.vercel.app
      # Object storage (use a managed S3-compatible service, e.g. Cloudflare R2):
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      # Real OCR (optional):
      - key: MISTRAL_API_KEY
        sync: false

  # --- Celery worker (shares the backend image) ---
  - type: worker
    name: cuisine-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.celery_app.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cuisine-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: cuisine-redis
          property: connectionString
