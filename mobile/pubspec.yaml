name: foodgad_mobile
description: Application mobile FoodGad (Flutter) — gestion de restauration.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  # file_picker was dropped: even its latest release (11.0.2) applies its own
  # Kotlin Gradle Plugin (1.8.22), which conflicts with Flutter's built-in
  # Kotlin — its classes never compile and the release APK fails on
  # GeneratedPluginRegistrant ("cannot find symbol: FilePickerPlugin").
  # file_selector is the Flutter-team-maintained equivalent.
  file_selector: ^1.0.3
  # Local cache for offline mode. Maintained by the Flutter team (like
  # file_selector) — the lesson from file_picker, which shipped its own Kotlin
  # Gradle Plugin and could never build a release APK.
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  # Fetches YouTube captions FROM the phone (residential IP) so the import works
  # where the server can't: YouTube bot-blocks Render's datacenter IP, but not a
  # normal phone. The transcript is then sent to /video/extract-transcript.
  youtube_explode_dart: ^3.1.0
  # Opens the stored invoice file (presigned URL) in the device browser/viewer —
  # the mobile equivalent of the web "Voir le fichier". Flutter-team maintained.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Polices du design FoodGad (Claude Design) — fichiers variables (axe wght ;
  # Flutter 3.4+ mappe TextStyle.fontWeight sur l'axe wght). Licence OFL incluse.
  fonts:
    - family: Public Sans
      fonts:
        - asset: assets/fonts/PublicSans.ttf
    - family: Newsreader
      fonts:
        - asset: assets/fonts/Newsreader.ttf
