name: cuisine_herman_mobile
description: Application mobile Cuisine Herman (Flutter) — gestion de restauration.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  # file_picker was dropped: even its latest release (11.0.2) applies its own
  # Kotlin Gradle Plugin (1.8.22), which conflicts with Flutter's built-in
  # Kotlin — its classes never compile and the release APK fails on
  # GeneratedPluginRegistrant ("cannot find symbol: FilePickerPlugin").
  # file_selector is the Flutter-team-maintained equivalent.
  file_selector: ^1.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
