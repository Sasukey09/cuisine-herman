name: cuisine_herman_mobile
description: Application mobile Cuisine Herman (Flutter) — gestion de restauration.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  # ^8 pinned us to 8.3.7, which compiles against android-34 while its own
  # transitive flutter_plugin_android_lifecycle demands 36 — the release APK
  # then died in checkReleaseAarMetadata. 11.x is built against a modern SDK.
  # The API we use (pickFiles + withData/type/allowedExtensions) is unchanged.
  file_picker: ^11.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
