# ---------------------------------------------------------------------------
# FoodGad — pipeline Codemagic : build iOS + publication TestFlight (beta Apple).
#
# AUCUN SECRET ICI. La cle App Store Connect (Issuer ID + Key ID + .p8) se
# configure dans l'interface Codemagic (Teams -> Integrations -> App Store
# Connect), puis se reference par son NOM ci-dessous (`integrations`).
#
# Le dossier mobile/ios est gitignore et regenere par `flutter create` (comme
# android/ dans la CI GitHub) : le workflow le regenere avant de builder.
#
# Bundle ID : foodgad-ios-2026 = celui de l'app FoodGad dans App Store Connect
# (appleId 6791293057). Il DOIT etre identique cote App ID (Developer portal),
# profil de signature ET app App Store Connect, sinon l'upload TestFlight
# echoue "Cannot determine the Apple ID from Bundle ID". Voir la var BUNDLE_ID.
# ---------------------------------------------------------------------------
workflows:
  ios-testflight:
    name: FoodGad iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Pas d'integration nommee : les identifiants App Store Connect viennent du
    # groupe de variables `appstore` (APP_STORE_CONNECT_ISSUER_ID /
    # _KEY_IDENTIFIER / _PRIVATE_KEY, secure). La CLI app-store-connect les lit
    # automatiquement, et le bloc `publishing` en bas les reference explicitement.
    environment:
      # Meme version que la CI GitHub du projet, pour des builds reproductibles.
      flutter: 3.44.1
      xcode: latest
      cocoapods: default
      groups:
        - appstore
      # PAS de bloc `ios_signing` ici : il declencherait la signature AUTOMATIQUE
      # de Codemagic (qui ne fait que CHERCHER un profil existant -> "No matching
      # profiles found" si le profil n'existe pas encore). On fait la signature
      # MANUELLE dans les scripts (`fetch-signing-files ... --create`), qui CREE
      # le certificat + le profil app_store pour foodgad-ios-2026.
      vars:
        # DOIT correspondre au Bundle ID de l'app FoodGad dans App Store Connect
        # (appleId 6791293057). Verifie via l'API App Store Connect : l'app
        # existe avec `foodgad-ios-2026` et AUCUNE app n'a com.foodgad.foodgadMobile.
        # Un bundle different -> upload "Cannot determine the Apple ID from Bundle ID".
        BUNDLE_ID: foodgad-ios-2026

    scripts:
      - name: Regenerer le projet iOS (ios/ est gitignore) + fixer le Bundle ID
        script: |
          cd mobile
          flutter create --platforms=ios --org com.foodgad --project-name foodgad_mobile .
          # `flutter create` derive le bundle du project-name (com.foodgad.<...>Mobile).
          # On FORCE le Bundle ID de la cible Runner sur celui de l'app App Store
          # Connect (foodgad-ios-2026), sans toucher a `.RunnerTests`, pour que
          # l'IPA corresponde au profil de signature ET a l'app cible de l'upload.
          sed -i '' -E 's/(PRODUCT_BUNDLE_IDENTIFIER = )com\.foodgad\.[A-Za-z_]*Mobile;/\1foodgad-ios-2026;/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Info.plist — nom affiche + conformite export (chiffrement exempte)
        script: |
          PLIST="$CM_BUILD_DIR/mobile/ios/Runner/Info.plist"
          plutil -replace CFBundleDisplayName -string "FoodGad" "$PLIST"
          # Declare que l'app n'utilise que du chiffrement EXEMPTE (HTTPS/TLS
          # standard + keychain iOS). Evite l'invite "conformite export" sur
          # TestFlight a CHAQUE build : le build est directement testable.
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST"

      - name: Recuperer les dependances Flutter
        script: |
          cd mobile
          flutter pub get

      - name: Installer les pods
        script: |
          cd mobile/ios
          pod install || true

      - name: Signature iOS — certificat de distribution + profil app_store, puis appliquer
        script: |
          set -e   # echoue franchement si une commande de signature plante
          keychain initialize
          # Approche officielle Codemagic (docs.codemagic.io/yaml-code-signing) :
          # la cle privee RSA 2048 CERTIFICATE_PRIVATE_KEY sert a generer le CSR.
          # Codemagic recupere le certificat de distribution correspondant OU en
          # cree un neuf, puis cree le profil app_store (--create). L'identite de
          # signature est donc toujours valide. Les identifiants App Store Connect
          # (issuer/key/private) viennent du groupe de variables `appstore`.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          cd mobile
          xcode-project use-profiles

      - name: Build IPA (release, numero de build auto-incremente)
        script: |
          cd mobile
          # PROJECT_BUILD_NUMBER est fourni par Codemagic et s'incremente a
          # chaque build : evite l'erreur "build number already used" sur TestFlight.
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        # Auth par cle API (groupe `appstore`) au lieu d'une integration nommee.
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Envoi automatique vers TestFlight (beta). Passe a false si tu veux
        # d'abord recuperer l'IPA et televerser a la main.
        submit_to_testflight: true
        # Optionnel : ajoute automatiquement le build a un groupe de testeurs
        # deja cree dans App Store Connect (decommente + mets le nom exact).
        # beta_groups:
        #   - Testeurs internes

  # -------------------------------------------------------------------------
  # Android -> test interne Google Play.
  #
  # PREREQUIS (cote toi, hors depot) :
  #  1. Generer l'upload key : sh scripts/android/generate_upload_keystore.sh
  #     (voir docs/ANDROID-RELEASE.md).
  #  2. Televerser le keystore dans Codemagic : Teams -> Code signing identities
  #     -> Android keystores. Lui donner un nom de reference (defaut : foodgad_upload).
  #  3. Ajouter le compte de service Google Play : Teams -> Integrations ->
  #     Google Play (JSON de compte de service GCP), reference par la variable
  #     GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (groupe google_play).
  #  4. L'app doit exister dans la Google Play Console avec l'applicationId
  #     com.foodgad.foodgad_mobile.
  # -------------------------------------------------------------------------
  android-internal:
    name: FoodGad Android — Test interne Google Play
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: 3.44.1
      groups:
        - google_play        # <-- doit contenir GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      android_signing:
        - foodgad_upload     # <-- nom de reference du keystore dans Codemagic

    scripts:
      - name: Regenerer le scaffolding Android (android/ partiellement gitignore)
        script: |
          cd mobile
          flutter create --platforms=android --org com.foodgad --project-name foodgad_mobile .

      - name: Recuperer les dependances Flutter
        script: |
          cd mobile
          flutter pub get

      - name: Ecrire key.properties depuis le keystore Codemagic
        script: |
          cd mobile/android
          cat > key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF

      - name: Build App Bundle (release, numero de build auto-incremente)
        script: |
          cd mobile
          flutter build appbundle --release --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - mobile/build/app/outputs/bundle/release/*.aab
      - mobile/build/app/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
